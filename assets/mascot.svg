<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" fill="none" role="img" aria-label="Pén Xiǎo Yǒu — Bonsai mascot">
  <title>盆小友 — Bonsai mascot</title>

  <!-- Soft ground shadow -->
  <ellipse cx="110" cy="210" rx="55" ry="5" fill="#1A1F1A" opacity="0.18"/>

  <!-- Pot body (Clay) -->
  <path d="M65 150 L155 150 L145 202 L75 202 Z" fill="#B8754A"/>

  <!-- Pot subtle left highlight -->
  <path d="M65 150 L74 150 L78 202 L75 202 Z" fill="#D4A574" opacity="0.4"/>

  <!-- Pot rim (Bark) -->
  <rect x="62" y="143" width="96" height="8" rx="2" fill="#3D2817"/>

  <!-- Soil -->
  <rect x="65" y="151" width="90" height="2" fill="#2C1A10" opacity="0.5"/>

  <!-- ═══ Face on pot (the friend) ═══ -->

  <!-- Left eye: squinting smile arc -->
  <path d="M86 172 Q 91 167, 96 172" stroke="#2C1A10" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Right eye -->
  <path d="M124 172 Q 129 167, 134 172" stroke="#2C1A10" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Blush cheeks (Amber tint) -->
  <ellipse cx="82" cy="182" rx="5" ry="3.5" fill="#D4A574" opacity="0.45"/>
  <ellipse cx="138" cy="182" rx="5" ry="3.5" fill="#D4A574" opacity="0.45"/>

  <!-- Small contented mouth -->
  <path d="M102 184 Q 110 188, 118 184" stroke="#2C1A10" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ═══ Tree above ═══ -->

  <!-- Trunk: organic curve -->
  <path d="M110 150 C 107 130, 122 120, 117 104 C 113 92, 95 88, 99 73 C 102 62, 116 57, 121 48"
        stroke="#3D2817" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small branch -->
  <path d="M105 96 L 90 100" stroke="#3D2817" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Canopy -->
  <ellipse cx="104" cy="68" rx="32" ry="24" fill="#7A9268"/>
  <ellipse cx="125" cy="48" rx="19" ry="15" fill="#A0B88C"/>
  <ellipse cx="83" cy="82" rx="18" ry="14" fill="#5A7248"/>
  <ellipse cx="112" cy="60" rx="13" ry="10" fill="#A0B88C" opacity="0.6"/>

  <!-- Individual leaf accents -->
  <circle cx="78" cy="70" r="2" fill="#A0B88C" opacity="0.8"/>
  <circle cx="135" cy="65" r="1.8" fill="#7A9268" opacity="0.9"/>

  <!-- Growth point (Amber) -->
  <circle cx="132" cy="32" r="4" fill="#D4A574"/>
  <circle cx="132" cy="32" r="1.5" fill="#F5F0E8" opacity="0.55"/>

  <!-- Tiny sparkle hint (Amber) -->
  <g opacity="0.7">
    <line x1="145" y1="25" x2="145" y2="21" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="145" y1="43" x2="145" y2="39" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="141" y1="32" x2="137" y2="32" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="153" y1="32" x2="149" y2="32" stroke="#D4A574" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
